name: NMT upstream watch

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

jobs:
  watch:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check upstream NMT canon state
        run: python scripts/check_nmt_upstream.py
